name: Vue App CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [first-project] # Add project folders here, e.g. [first-project, future-project]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: "./${{ matrix.project }}/web/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: ./${{ matrix.project }}/web
        run: pnpm install

      - name: Type check
        working-directory: ./${{ matrix.project }}/web
        run: pnpm run type-check

      - name: Build
        working-directory: ./${{ matrix.project }}/web
        run: pnpm run build-only
