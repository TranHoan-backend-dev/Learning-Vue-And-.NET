name: .NET Core CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [first-project] # Add project folders here, e.g. [first-project, future-project]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        working-directory: ./${{ matrix.project }}/be
        run: dotnet restore

      - name: Build
        working-directory: ./${{ matrix.project }}/be
        run: dotnet build --no-restore

      - name: Test
        working-directory: ./${{ matrix.project }}/be
        run: dotnet test --no-build --verbosity normal
